# 数据库配置
# 使用MySQL数据库
spring.datasource.url=jdbc:mysql://localhost:3306/campus_second_hand?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root123

# JPA配置
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.sql.init.schema-locations=classpath:data.sql
spring.sql.init.data-locations=classpath:import.sql

# 服务器配置
server.port=8081

# JWT配置
jwt.secret=mySecretKeyForCampusSecondHandPlatform2023
jwt.expiration=86400000

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 日志配置
logging.level.root=INFO
logging.level.com.campus.secondhandplatform=DEBUG